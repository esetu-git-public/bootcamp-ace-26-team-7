name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          grep -vE '^torch|^--extra-index-url' requirements.txt > req-ci.txt
          pip install pytest gradio -r req-ci.txt

      - name: Run tests
        run: python -m pytest tests/ --junit-xml=report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        run: |
          git remote add hf https://amruthjakku:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/amruthjakku/surface-crack-detection
          git checkout --orphan clean-deploy
          git config user.email "ci@deploy.bot"
          git config user.name "CI Deploy"
          git add -A
          git commit -m "Deploy $(date -u +'%Y-%m-%d %H:%M:%S')" --allow-empty
          git push hf clean-deploy:main --force
